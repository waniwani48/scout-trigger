<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Sync</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100vh;background:#0a0a1a;color:#fff;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.logo{font-size:2.5rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#6366f1,#ec4899,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.sub{color:#64748b;font-size:.85rem;margin-bottom:2rem;letter-spacing:.05em}
#btn{font-size:1.1rem;padding:.9rem 2.5rem;border:none;border-radius:50px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;cursor:pointer;transition:all .4s;font-weight:600;box-shadow:0 4px 24px rgba(99,102,241,.4);position:relative;overflow:hidden}
#btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(99,102,241,.6)}
#btn:active{transform:translateY(0)}
#btn:disabled{background:#334155;box-shadow:none;cursor:default;transform:none}
#btn .shimmer{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{to{left:100%}}
#status{margin-top:2rem;width:100%;max-width:360px;min-height:200px}
.pct{font-size:3.5rem;font-weight:800;background:linear-gradient(135deg,#6366f1,#4ecca3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;line-height:1}
.bar-wrap{width:100%;height:6px;background:#1e293b;border-radius:3px;margin:1rem 0;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#6366f1,#8b5cf6,#4ecca3);transition:width .6s cubic-bezier(.4,0,.2,1);width:0%}
.step-name{text-align:center;color:#94a3b8;font-size:.85rem;margin-bottom:1.5rem}
.pf-list{display:flex;flex-direction:column;gap:.5rem}
.pf{display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;background:#1e293b;border-radius:10px;font-size:.8rem;transition:all .4s}
.pf.active{background:#1e3a5f;border:1px solid #3b82f6}
.pf.done{background:#0f2922;border:1px solid #10b981}
.pf-icon{width:8px;height:8px;border-radius:50%;background:#334155;flex-shrink:0;transition:all .4s}
.pf.active .pf-icon{background:#3b82f6;box-shadow:0 0 8px #3b82f6;animation:pulse 1s infinite}
.pf.done .pf-icon{background:#10b981;box-shadow:0 0 8px #10b981;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pf-name{flex:1;color:#94a3b8}.pf.active .pf-name{color:#93c5fd}.pf.done .pf-name{color:#6ee7b7}
.pf-status{color:#475569;font-size:.75rem}.pf.active .pf-status{color:#60a5fa}.pf.done .pf-status{color:#34d399}
.done-msg{text-align:center;margin-top:1.5rem;animation:fadeUp .6s ease}
.done-msg h2{font-size:1.5rem;color:#4ecca3;margin-bottom:.5rem}
.done-msg p{color:#64748b;font-size:.85rem}
.done-msg a{color:#8b5cf6;text-decoration:none;font-weight:600}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.err{color:#f87171;text-align:center;margin-top:1rem}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <div class="logo">Scout Sync</div>
  <div class="sub">REALITY / Palmu / IRIAM / Spoon / SHOWROOM</div>
  <button id="btn" onclick="run()"><span class="shimmer"></span>Sync Now</button>
  <div id="status"></div>
</div>

<script>
// Particle background
const c=document.getElementById('bg'),x=c.getContext('2d');
let W,H,pts=[];
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;pts=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,a:Math.random()*.5+.1}))}
resize();addEventListener('resize',resize);
function draw(){x.clearRect(0,0,W,H);for(const p of pts){p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>W)p.dx*=-1;if(p.y<0||p.y>H)p.dy*=-1;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=`rgba(99,102,241,${p.a})`;x.fill()}
for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<120){x.beginPath();x.moveTo(pts[i].x,pts[i].y);x.lineTo(pts[j].x,pts[j].y);x.strokeStyle=`rgba(99,102,241,${.08*(1-d/120)})`;x.stroke()}}
requestAnimationFrame(draw)}
draw();

// Auth
const _a='Z2l0aHViX3BhdF8xMUNCV1RESlkwNk5jMWVWQk80';
const _b='R05OX1ZpdDBUdVhJS1lZZWNQRkpMbTZkeERNMnI0';
const _c='anhmdXVVOWJ5endZd1k3b2dFNUFUWTVOQXMxamxaS2lQ';
function _t(){return atob(_a+_b+_c)}
const API='https://api.github.com/repos/waniwani48/scout-automation';
const H2={'Authorization':'Bearer '+_t(),'Accept':'application/vnd.github+json'};

const PFS=[
  {id:'env',name:'Environment Setup',time:8},
  {id:'reality',name:'REALITY',time:2},
  {id:'palmu',name:'Palmu',time:15},
  {id:'iriam',name:'IRIAM',time:3},
  {id:'spoon',name:'Spoon',time:10},
  {id:'showroom',name:'SHOWROOM',time:2},
  {id:'notion',name:'Notion Sync',time:60},
  {id:'archive',name:'Archive & Export',time:20},
];

function showProgress(pct,stepIdx){
  const st=document.getElementById('status');
  let pfHtml='';
  PFS.forEach((p,i)=>{
    const cls=i<stepIdx?'pf done':i===stepIdx?'pf active':'pf';
    const stat=i<stepIdx?'Done':i===stepIdx?'Processing...':'Waiting';
    pfHtml+=`<div class="${cls}"><div class="pf-icon"></div><div class="pf-name">${p.name}</div><div class="pf-status">${stat}</div></div>`;
  });
  st.innerHTML=`
    <div class="pct">${pct}%</div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
    <div class="step-name">${stepIdx<PFS.length?PFS[stepIdx].name:'Finishing...'}</div>
    <div class="pf-list">${pfHtml}</div>`;
}

function showDone(){
  const st=document.getElementById('status');
  st.innerHTML=`
    <div class="pct">100%</div>
    <div class="bar-wrap"><div class="bar-fill" style="width:100%"></div></div>
    <div class="done-msg">
      <h2>Sync Complete</h2>
      <p>Notionを確認してください</p>
    </div>`;
  document.getElementById('btn').innerHTML='<span class="shimmer"></span>Done';
}

function showError(msg){
  document.getElementById('status').innerHTML=`<div class="err">${msg}</div>`;
  const btn=document.getElementById('btn');
  btn.innerHTML='<span class="shimmer"></span>Retry';
  btn.disabled=false;
}

async function pollStatus(runId){
  let elapsed=0;
  const totalTime=PFS.reduce((s,p)=>s+p.time,0);
  const poll=setInterval(async()=>{
    elapsed+=5;
    let acc=0,stepIdx=0;
    for(let i=0;i<PFS.length;i++){acc+=PFS[i].time;if(elapsed<acc){stepIdx=i;break}if(i===PFS.length-1)stepIdx=PFS.length-1;}
    const pct=Math.min(95,Math.round(elapsed/totalTime*100));
    showProgress(pct,stepIdx);
    try{
      const r=await fetch(`${API}/actions/runs/${runId}`,{headers:H2});
      if(r.ok){const d=await r.json();if(d.status==='completed'){clearInterval(poll);d.conclusion==='success'?showDone():showError('Sync failed: '+d.conclusion)}}
    }catch(e){}
  },5000);
}

async function run(){
  const btn=document.getElementById('btn');
  btn.disabled=true;
  btn.innerHTML='<span class="shimmer"></span>Starting...';
  showProgress(0,0);
  try{
    const r=await fetch(`${API}/actions/workflows/sync.yml/dispatches`,{method:'POST',headers:H2,body:JSON.stringify({ref:'main'})});
    if(r.status===204){
      showProgress(3,0);
      await new Promise(r=>setTimeout(r,5000));
      try{
        const runs=await fetch(`${API}/actions/runs?per_page=1&event=workflow_dispatch`,{headers:H2});
        const d=await runs.json();
        if(d.workflow_runs?.length>0)pollStatus(d.workflow_runs[0].id);
        else showProgress(5,0);
      }catch(e){showProgress(5,0)}
    }else{showError('Error: '+r.status)}
  }catch(e){showError(e.message)}
}
run();
</script>
</body>
</html>
